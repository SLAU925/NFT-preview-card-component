<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset="UTF-8">
        <meta name = "description" content = "nft preview">
        <meta name = "viewport" content  ="width=device-width, initial-scale=1.0">
        <title>NFT preview card component</title>
        <link rel = "stylesheet" href  = "style.css">
        <link rel = "icon" href ="favicon-32x32.png">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    </head>

    <body>
        <main>
            <div class ="cube_container">
                <img src ="image-equilibrium.jpg" alt = "image-equilibrium" class = "cube">
                <div class = "overlay"></div>
                <img src ="icon-view.svg" alt ="icon-view" class = "view">
            </div>
            <h1 class = "title">Equilibrium #3429</h1>
            <p class = "title_subtext">Our Equilibrium collection promotes balance and calm</p>
            <section class = "icon">
                <div class = "icon_eth">
                    <img src ="icon-ethereum.svg" alt = "icon-ethereum">
                    <p class = "eth">0.041 ETH</p>
                </div>
                <div class = "icon_clk">
                    <img src = "icon-clock.svg" alt = "icon-clock">
                    <p class = "time">3 days left</p>
                    
                </div>
            </section>
            <hr>

            <div class = "avatar_box">
                <img src = "image-avatar.png" width = "35" alt = "image-avatar" class = "avatar"> 
                <p class = "ending">Creation of <span> Jules Wyvern</span></p>
            </div>
        </main>

    </body>
</html>
